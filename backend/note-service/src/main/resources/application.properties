spring.application.name=note-service
server.port=8183

spring.datasource.url=jdbc:postgresql://localhost:5432/devpath_note
spring.datasource.username=devpath_user
spring.datasource.password=devpath_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}


# Actuator
management.endpoints.web.exposure.include=*


jwt.secret=devpath-super-secret-key-devpath-super-secret-key