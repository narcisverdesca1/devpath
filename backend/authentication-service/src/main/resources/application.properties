spring.application.name=authentication-service
server.port=8182

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.datasource.url=jdbc:postgresql://localhost:5432/devpath_auth
spring.datasource.username=devpath_user
spring.datasource.password=devpath_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
# Local defaults are provided only for development.
# In production, override these values through environment variables.
jwt.secret=${JWT_SECRET:devpath-super-secret-key-devpath-super-secret-key}
jwt.expiration=${JWT_EXPIRATION:86400000}
